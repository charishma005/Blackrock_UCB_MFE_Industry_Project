# Global RV pod — cross-market RELATIVE VALUE view: US 10y vs euro-area/UK/Japan 10y.
# See _TEMPLATE.yaml for the full field-by-field contract.
#
# Axis (declared, never fitted): US-MINUS-FOREIGN 10-YEAR YIELD SPREAD. +1 = US 10y
# rises relative to the foreign market (spread widens). US-driver signs are the
# catalog's rates-axis signs (they move the US leg); foreign rates analysts are graded
# on their own 10y level, so their sign onto this axis is -1 (foreign yields up =
# spread narrows). curve_slope is deliberately NOT on this pod's panel: its graded
# measurement is a US slope, which does not project cleanly onto a cross-market
# 10y spread axis.
#
# The foreign analysts' reports arrive from per-bank text corpora (ECB/BoE/BoJ) and
# INTL_* Bloomberg series — see data/intl/README.md for the point-in-time contract.

display_name: "Global RV — US vs euro-area/UK/Japan 10-year spreads"

clock_freq: ME

# Per-driver convictions are about each driver's OWN headline measurement, not its
# effect on the spread — the only setting under which ic_pm and ic_analyst compare
# like for like. See the ANSWER_SPACES note in llm_pm.py.
answer_space: driver

board:
  stale_after_days: 45
  expire_after_days: 95

listens_to:
  inflation:
    polarity: +1            # hotter US inflation = US yields up = spread widens
  term_premium:
    polarity: +1            # dgs10_level up = higher US long-end = spread widens
  balance_sheet:
    polarity: -1            # fed_assets up = easing = US yields down = spread narrows
  ea_rates:
    polarity: -1            # bund10y_level up = foreign leg up = spread narrows
  uk_rates:
    polarity: -1            # gilt10y_level up = foreign leg up = spread narrows
  jp_rates:
    polarity: -1            # jgb10y_level up = foreign leg up = spread narrows

reads: all

mandate:
  - "Judge which way the US-minus-foreign 10-year spread moves over the horizon: does the US long end rise or fall RELATIVE to Bunds, gilts, and JGBs?"
  - "A view here is about the SPREAD, never outright duration — read the common global level out and keep only the divergence."
  - "Prefer the single market pair where US and local evidence diverge most clearly; a view spread thinly across all three pairs is a level view in disguise."
  - "The foreign analysts judge their own markets in local terms; you are the only seat that sees both sides of each spread."

weighing:
  staleness:    "A STALE foreign read weakens a spread call more than a stale US one — there are three US-side reads to cross-check and only one per foreign market; discount toward no-view on that pair."
  disagreement: "US and foreign drivers agreeing on direction (all yields up) is a LEVEL move, not an RV view — the spread call lives where they disagree."
  gaps:         "Use the missing-inputs graph to catch a spread call resting on policy divergence only one side's analyst can actually see."
  override:     "Override an analyst only where the cross-market read changes the relative picture, never on the outright level."

trade:
  # DGS10 prices from the vendored FRED curve; the INTL_* 10y series are percent
  # yields on the same weekly clock (data/intl/), so the yield-space grader's
  # sum(w * dy) is exactly the spread P&L.
  universe: [DGS10, INTL_DE10Y, INTL_UK10Y, INTL_JP10Y]
  max_legs: 2
  # Equal-and-opposite legs so the common global level nets out and only the spread
  # remains. Prompt-inert; enforced at parse time and reported by the grader.
  sign_convention: opposed
  # The declared structural pair for the mechanical/structural control: the
  # transatlantic spread (UST vs Bund) — the deepest and most canonical pair. The
  # LLM may pick any pair from the universe; the control trades this one only.
  # Read by structural.structural_trade: the `long` leg takes the rate-axis
  # projection's sign, the `front` leg the opposite (projection +1 = US yields up
  # relative = +DGS10 / -INTL_DE10Y in yield space).
  leg_roles:
    front: INTL_DE10Y
    long: DGS10
  mandate:
    - "One cross-market pair: legs EQUAL AND OPPOSITE so a parallel global shift nets out and only the spread remains."
    - "Must NOT be a directional duration bet in either market."
  risk_tags: [duration, curve, carry, liquidity, policy, positioning, fx]
