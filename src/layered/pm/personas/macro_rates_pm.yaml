# Macro rates PM — the transmission map from driver-space to instrument-space.
#
# "Choosing that expression requires a model the analysts do not hold: how the
#  drivers propagate to instruments ... That map is each PM's real edge, and it
#  is where the market's economic structure lives."
#
# This file IS that map, kept as config so the PM's edge is legible and tunable
# without touching code. The PM reads four single-driver views and projects them
# onto two points on the curve, then trades the slope while hedging the level.

display_name: "macro rates PM (2s/10s curve)"

# How each driver pushes the FRONT END (2y) — the policy-path / hawkishness axis.
# Positive weight = a driver reading of "up" pushes the front-end yield UP.
front_end_weights:
  inflation: 0.50          # hotter inflation → more hawkish path → front-end up
  labor_tightness: 0.35    # tighter labor → more hawkish path → front-end up
  balance_sheet: -0.15     # balance sheet DOWN (runoff/QT) is hawkish → front-end up

# How each driver pushes the LONG END (10y) — the term-premium axis.
long_end_weights:
  term_premium: 0.60       # rising long-end premium → long-end up
  balance_sheet: -0.40     # runoff drains demand for duration → term premium up → long-end up

# ETF proxies for the two curve points, with approximate effective durations
# (years). Legs are sized to be DV01-neutral from these so the trade isolates
# the 2s10s slope and hedges the parallel level of rates.
instruments:
  front:  { symbol: SHY, duration: 1.9 }   # 1-3yr Treasuries ≈ the 2y point
  long:   { symbol: IEF, duration: 7.5 }   # 7-10yr Treasuries ≈ the 10y point

# A committee that conflicts (inflation hawkish while labor is dovish) bets
# smaller: conviction is haircut by this fraction of the measured disagreement,
# preserving disagreement as a signal rather than averaging it away.
disagreement_haircut: 0.5
