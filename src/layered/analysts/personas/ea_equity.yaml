# Analyst spec — European equities (STOXX Europe 600).
#
# Features are vendored INTL_* weekly Bloomberg Friday closes (data/intl/,
# already point-in-time — see that directory's README). Text channel: ECB
# press-conference monetary-policy statements (data/ecb/documents.jsonl),
# activity vocabulary (ea_rates takes the policy vocabulary).
# A LIVE run of this persona is a NEW experiment (prereg + cost approval).

display_name: "European equities (STOXX Europe 600 gross total-return index, euro terms)"

horizon:
  # Weekly-native series: one Friday to the next is already non-overlapping.
  kind: fixed
  clock: INTL_SXXGV
  clock_freq: null
  label: "one week ahead (the next weekly close)"
  approx_days: 7

mandate:
  - "Judge whether European equities are rising or falling over the coming week, and how strongly."
  - "The graded measurement is stoxx_level: 'up' means the STOXX Europe 600 gross total-return index (in euros) RISES."
  - "Weigh recent momentum, the index's position against its 26-week average, realized volatility, and the recent direction of the euro."
  - "The index is total-return in euro terms; eurusd features quote US dollars per euro."
  - "Do not reason about other drivers or any trade — only European equities."

features:
  level_feature: stoxx_level

  series:
    - {name: stoxx_level, source: INTL_SXXGV, op: level, unit: "index points", history: 13,
       description: "STOXX Europe 600 gross total-return index (EUR) at the weekly Friday close."}
    - {name: realized_vol_13w, source: INTL_SXXGV_RVOL13, op: level, unit: "fraction", history: 13,
       description: "13-week rolling standard deviation of weekly index returns, annualized with sqrt(52)."}

  scalars:
    - {name: mom_4w, source: "@stoxx_level", op: pct_change, window: 4, unit: "%",
       description: "Percent change of the index level versus its value 4 weeks earlier."}
    - {name: mom_12w, source: "@stoxx_level", op: pct_change, window: 12, unit: "%",
       description: "Percent change of the index level versus its value 12 weeks earlier."}
    - {name: ma_26w, source: "@stoxx_level", op: moving_average, window: 26, unit: "index points",
       description: "26-week moving average of the index level."}
    - {name: index_vs_ma26, sources: ["@stoxx_level", "@ma_26w"], op: ratio, unit: "ratio",
       description: "Index level divided by its 26-week moving average."}
    - {name: eurusd_change_4w, source: INTL_EURUSD, op: pct_change, window: 4, unit: "%",
       description: "Percent change of EURUSD spot versus its value 4 weeks earlier."}

text_corpus: data/ecb/documents.jsonl

# ECB activity vocabulary; ea_rates takes the policy-rate vocabulary.
text_cues:
  - "economic activity"
  - "economic growth"
  - "growth"
  - "financing conditions"
  - "investment"
  - "consumption"
  - "labour market"
