# Analyst spec — Treasury curve-slope driver (the 2s10s spread, 10y − 2y).
#
# A market driver: the 2s10s updates every business day, so grading a next-day move
# would be noise and daily spacing would break the non-overlapping-observation basis
# of the t-statistic. The clock is therefore resampled to month-end (clock_freq: ME)
# and the call is the change over the next month. Feature windows are in TRADING DAYS
# (21 ≈ 1 month, 63 ≈ 3 months, 252 ≈ 1 year). See _TEMPLATE.yaml for the reference.

display_name: "Treasury curve slope (2s10s spread, 10-year minus 2-year)"

horizon:
  kind: fixed
  clock: DGS10
  clock_freq: ME
  label: "month end, roughly one month ahead"
  approx_days: 31

mandate:
  - "Judge whether the 2s10s curve is steepening or flattening, and how strongly."
  - "The graded measurement is the 2s10s spread (10-year minus 2-year): rising ('up') is steepening, falling is flattening or more inverted."
  - "Weigh the level of the spread (how inverted it is), its recent direction, and where it sits in its 12-month range."
  - "The spread is the arithmetic difference of two legs. Judge which leg is doing the moving:
     a front-end-led move and a long-end-led move are different situations, and reading the
     slope without its legs conflates them."
  - "The 10s30s slope is context on the long end; the front end is a different driver."
  - "Do not reason about the level of rates, inflation, the labor market, or any trade — only the slope."

features:
  level_feature: slope_2s10s

  series:
    - {name: slope_2s10s, sources: [DGS10, DGS2], op: spread, unit: "pp", history: 10,
       description: "The 10-year Treasury yield minus the 2-year Treasury yield, in percentage points."}

  scalars:
    - {name: dgs2, source: DGS2, op: level, unit: "%",
       description: "The 2-year Treasury constant-maturity yield, in percent."}
    - {name: dgs10, source: DGS10, op: level, unit: "%",
       description: "The 10-year Treasury constant-maturity yield, in percent."}
    # Leg decomposition. The spread is an arithmetic difference, so every slope move
    # is made by one leg or both — but with only leg LEVELS on the board, which leg
    # is doing the moving was mental arithmetic across four numbers. Stated directly,
    # the same reasoning as inflation's base-effect terms: a measurement the graded
    # quantity is mechanically built from, computed by ops from past data, no fitting.
    - {name: dgs2_change_21d, source: DGS2, op: diff, window: 21, unit: "pp",
       description: "The 2-year yield minus its value 21 trading days ago, in percentage points."}
    - {name: dgs10_change_21d, source: DGS10, op: diff, window: 21, unit: "pp",
       description: "The 10-year yield minus its value 21 trading days ago, in percentage points."}
    - {name: dgs2_change_63d, source: DGS2, op: diff, window: 63, unit: "pp",
       description: "The 2-year yield minus its value 63 trading days ago, in percentage points."}
    - {name: dgs10_change_63d, source: DGS10, op: diff, window: 63, unit: "pp",
       description: "The 10-year yield minus its value 63 trading days ago, in percentage points."}
    - {name: slope_change_21d, source: "@slope_2s10s", op: diff, window: 21, unit: "pp",
       description: "slope_2s10s minus its value 21 trading days ago, in percentage points."}
    - {name: slope_change_63d, source: "@slope_2s10s", op: diff, window: 63, unit: "pp",
       description: "slope_2s10s minus its value 63 trading days ago, in percentage points."}
    - {name: slope_change_252d, source: "@slope_2s10s", op: diff, window: 252, unit: "pp",
       description: "slope_2s10s minus its value 252 trading days ago, in percentage points."}
    - {name: slope_12m_low, source: "@slope_2s10s", op: rolling_min, window: 252, unit: "pp",
       description: "The lowest slope_2s10s over the trailing 252 trading days."}
    - {name: slope_12m_high, source: "@slope_2s10s", op: rolling_max, window: 252, unit: "pp",
       description: "The highest slope_2s10s over the trailing 252 trading days."}
    - {name: slope_above_12m_low, sources: ["@slope_2s10s", "@slope_12m_low"], op: spread, unit: "pp",
       description: "slope_2s10s minus slope_12m_low, in percentage points."}
    - {name: slope_range_width, sources: ["@slope_12m_high", "@slope_12m_low"], op: spread, unit: "pp",
       description: "slope_12m_high minus slope_12m_low, in percentage points."}
    - {name: slope_range_position, sources: ["@slope_above_12m_low", "@slope_range_width"], op: ratio, unit: "0-1",
       description: "slope_above_12m_low divided by slope_range_width; 0 at the trailing-12-month low, 1 at the high."}
    - {name: slope_10s30s, sources: [DGS30, DGS10], op: spread, unit: "pp",
       description: "The 30-year Treasury yield minus the 10-year Treasury yield, in percentage points."}
    - {name: slope_distance_from_flat, source: "@slope_2s10s", op: distance_from_reference, reference: 0.0, unit: "pp",
       description: "slope_2s10s minus 0.0, in percentage points."}

# Curve shape is a function of the policy path, so the cues are the policy-stance
# language other analysts' mandates forbid — here it is the analyst's own subject.
text_cues:
  - "target range"
  - "federal funds"
  - "monetary policy"
  - restrictive
  - accommodative
  - "longer-run"
  - "longer run"
  - pace
