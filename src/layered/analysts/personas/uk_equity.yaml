# Analyst spec — UK equities (FTSE 100).
#
# Features are vendored INTL_* weekly Bloomberg Friday closes (data/intl/,
# already point-in-time — see that directory's README). Text channel: Bank of
# England Monetary Policy Summaries (data/boe/documents.jsonl), activity
# vocabulary (uk_rates takes the policy vocabulary); summaries exist only from
# 2015-08, so earlier asof dates see no text — expected, not an error.
# A LIVE run of this persona is a NEW experiment (prereg + cost approval).

display_name: "UK equities (FTSE 100 price index, sterling terms)"

horizon:
  # Weekly-native series: one Friday to the next is already non-overlapping.
  kind: fixed
  clock: INTL_UKX
  clock_freq: null
  label: "one week ahead (the next weekly close)"
  approx_days: 7

mandate:
  - "Judge whether UK large-cap equities are rising or falling over the coming week, and how strongly."
  - "The graded measurement is ftse_level: 'up' means the FTSE 100 price index (in sterling) RISES."
  - "Weigh recent momentum, the index's position against its 26-week average, realized volatility, and the recent direction of sterling."
  - "The index is a PRICE index in sterling — dividends are excluded; gbpusd features quote US dollars per pound."
  - "Do not reason about other drivers or any trade — only UK equities."

features:
  level_feature: ftse_level

  series:
    - {name: ftse_level, source: INTL_UKX, op: level, unit: "index points", history: 13,
       description: "FTSE 100 price index (GBP) at the weekly Friday close."}
    - {name: realized_vol_13w, source: INTL_UKX_RVOL13, op: level, unit: "fraction", history: 13,
       description: "13-week rolling standard deviation of weekly index returns, annualized with sqrt(52)."}

  scalars:
    - {name: mom_4w, source: "@ftse_level", op: pct_change, window: 4, unit: "%",
       description: "Percent change of the index level versus its value 4 weeks earlier."}
    - {name: mom_12w, source: "@ftse_level", op: pct_change, window: 12, unit: "%",
       description: "Percent change of the index level versus its value 12 weeks earlier."}
    - {name: ma_26w, source: "@ftse_level", op: moving_average, window: 26, unit: "index points",
       description: "26-week moving average of the index level."}
    - {name: index_vs_ma26, sources: ["@ftse_level", "@ma_26w"], op: ratio, unit: "ratio",
       description: "Index level divided by its 26-week moving average."}
    - {name: gbpusd_change_4w, source: INTL_GBPUSD, op: pct_change, window: 4, unit: "%",
       description: "Percent change of GBPUSD spot versus its value 4 weeks earlier."}

text_corpus: data/boe/documents.jsonl

# BoE activity vocabulary; uk_rates takes the policy-rate vocabulary.
text_cues:
  - "demand"
  - "output"
  - "growth"
  - "economic activity"
  - "labour market"
  - "consumption"
  - "investment"
