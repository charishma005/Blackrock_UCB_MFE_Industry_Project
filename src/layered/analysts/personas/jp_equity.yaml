# Analyst spec — Japanese equities (MSCI Japan, USD terms).
#
# Features are vendored INTL_* weekly Bloomberg Friday closes (data/intl/,
# already point-in-time — see that directory's README). Text channel: Bank of
# Japan Statements on Monetary Policy (data/boj/documents.jsonl), activity
# vocabulary (jp_rates takes the policy vocabulary).
# Currency note (deliberate, decided by GA): the graded index is USD-
# denominated — its moves mix Japanese equities and the yen, which is why the
# mandate states it and JPYUSD is a declared feature.
# A LIVE run of this persona is a NEW experiment (prereg + cost approval).

display_name: "Japanese equities (MSCI Japan gross total-return index, US-dollar terms)"

horizon:
  # Weekly-native series: one Friday to the next is already non-overlapping.
  kind: fixed
  clock: INTL_MSCIJP
  clock_freq: null
  label: "one week ahead (the next weekly close)"
  approx_days: 7

mandate:
  - "Judge whether Japanese equities are rising or falling over the coming week, and how strongly."
  - "The graded measurement is msci_jp_level: 'up' means the MSCI Japan gross total-return index (in US dollars) RISES."
  - "The index is US-DOLLAR-denominated: its moves mix Japanese equity performance and the yen — yen strength alone lifts the index. Weigh both, using the jpyusd features to separate them."
  - "Also weigh recent momentum, the index's position against its 26-week average, and realized volatility."
  - "Do not reason about other drivers or any trade — only Japanese equities."

features:
  level_feature: msci_jp_level

  series:
    - {name: msci_jp_level, source: INTL_MSCIJP, op: level, unit: "index points", history: 13,
       description: "MSCI Japan gross total-return index (USD) at the weekly Friday close."}
    - {name: realized_vol_13w, source: INTL_MSCIJP_RVOL13, op: level, unit: "fraction", history: 13,
       description: "13-week rolling standard deviation of weekly index returns, annualized with sqrt(52)."}

  scalars:
    - {name: mom_4w, source: "@msci_jp_level", op: pct_change, window: 4, unit: "fraction",
       description: "Index level divided by its value 4 weeks earlier, minus 1."}
    - {name: mom_12w, source: "@msci_jp_level", op: pct_change, window: 12, unit: "fraction",
       description: "Index level divided by its value 12 weeks earlier, minus 1."}
    - {name: ma_26w, source: "@msci_jp_level", op: moving_average, window: 26, unit: "index points",
       description: "26-week moving average of the index level."}
    - {name: index_vs_ma26, sources: ["@msci_jp_level", "@ma_26w"], op: ratio, unit: "ratio",
       description: "Index level divided by its 26-week moving average."}
    - {name: jpyusd_change_4w, source: INTL_JPYUSD, op: pct_change, window: 4, unit: "fraction",
       description: "JPYUSD spot divided by its value 4 weeks earlier, minus 1."}
    - {name: jpyusd_change_12w, source: INTL_JPYUSD, op: pct_change, window: 12, unit: "fraction",
       description: "JPYUSD spot divided by its value 12 weeks earlier, minus 1."}

text_corpus: data/boj/documents.jsonl

# BoJ activity vocabulary; jp_rates takes the policy-rate vocabulary.
text_cues:
  - "economic activity"
  - "corporate profits"
  - "exports"
  - "financial conditions"
  - "private consumption"
  - "business fixed investment"
