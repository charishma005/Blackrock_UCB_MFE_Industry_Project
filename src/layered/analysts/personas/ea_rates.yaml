# Analyst spec — euro-area rates (German Bund curve as the euro-area benchmark).
#
# Features are vendored INTL_* weekly Bloomberg Friday closes (data/intl/,
# already point-in-time — see that directory's README). Text channel: ECB
# press-conference monetary-policy statements (data/ecb/documents.jsonl).
# A LIVE run of this persona is a NEW experiment (prereg + cost approval).

display_name: "euro-area rates (German Bund yields, the euro-area benchmark curve)"

horizon:
  # Weekly-native series: one Friday to the next is already non-overlapping.
  kind: fixed
  clock: INTL_DE10Y
  clock_freq: null
  label: "one week ahead (the next weekly close)"
  approx_days: 7

mandate:
  - "Judge whether euro-area long-term yields are rising or falling over the coming week, and how strongly."
  - "The graded measurement is bund10y_level: 'up' means the 10-year Bund yield RISES."
  - "Weigh the level of the 10-year yield, the 2s10s slope, the spread to US Treasuries, and the recent direction of short rates (the policy-expectations proxy) and the euro."
  - "All yields are percent in local (euro) terms; eurusd features quote US dollars per euro."
  - "Do not reason about other drivers or any trade — only euro-area rates."

features:
  level_feature: bund10y_level

  series:
    - {name: bund10y_level, source: INTL_DE10Y, op: level, unit: "%", history: 13,
       description: "10-year German Bund benchmark yield at the weekly Friday close."}
    - {name: slope_2s10s, sources: [INTL_DE10Y, INTL_DE2Y], op: spread, unit: "pp", history: 13,
       description: "10-year Bund yield minus 2-year Schatz yield, in percentage points."}
    - {name: bund_ust_spread, sources: [INTL_DE10Y, INTL_US10Y], op: spread, unit: "pp", history: 13,
       description: "10-year Bund yield minus 10-year US Treasury yield, in percentage points."}

  scalars:
    - {name: bund2y_level, source: INTL_DE2Y, op: level, unit: "%",
       description: "2-year German Schatz yield at the weekly Friday close."}
    - {name: bund2y_change_4w, source: INTL_DE2Y, op: diff, window: 4, unit: "pp",
       description: "2-year Schatz yield minus its value 4 weeks earlier."}
    - {name: bund10y_change_4w, source: "@bund10y_level", op: diff, window: 4, unit: "pp",
       description: "10-year Bund yield minus its value 4 weeks earlier."}
    - {name: eurusd_change_4w, source: INTL_EURUSD, op: pct_change, window: 4, unit: "fraction",
       description: "EURUSD spot divided by its value 4 weeks earlier, minus 1."}

text_corpus: data/ecb/documents.jsonl

# ECB policy-rate / inflation-outlook vocabulary. The equity persona for the
# same bank (ea_equity) takes the activity vocabulary — the within-bank
# partition is what preserves rates/equity analyst independence.
text_cues:
  - "key ECB interest rates"
  - "deposit facility"
  - "main refinancing operations"
  - "marginal lending facility"
  - "interest rate"
  - "inflation"
  - "price stability"
  - "asset purchase"
  - "PEPP"
