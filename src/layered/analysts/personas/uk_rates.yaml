# Analyst spec — UK rates (gilt curve).
#
# Features are vendored INTL_* weekly Bloomberg Friday closes (data/intl/,
# already point-in-time — see that directory's README). Text channel: Bank of
# England Monetary Policy Summaries (data/boe/documents.jsonl) — published
# with each decision only since 2015-08, so earlier asof dates see no text
# (the pipeline reports the channel unavailable, which is expected).
# A LIVE run of this persona is a NEW experiment (prereg + cost approval).

display_name: "UK rates (gilt yields, the UK benchmark curve)"

horizon:
  # Weekly-native series: one Friday to the next is already non-overlapping.
  kind: fixed
  clock: INTL_UK10Y
  clock_freq: null
  label: "one week ahead (the next weekly close)"
  approx_days: 7

mandate:
  - "Judge whether UK long-term yields are rising or falling over the coming week, and how strongly."
  - "The graded measurement is gilt10y_level: 'up' means the 10-year gilt yield RISES."
  - "Weigh the level of the 10-year yield, the 2s10s slope, the spread to US Treasuries, and the recent direction of short rates (the policy-expectations proxy) and sterling."
  - "All yields are percent in local (sterling) terms; gbpusd features quote US dollars per pound."
  - "Do not reason about other drivers or any trade — only UK rates."

features:
  level_feature: gilt10y_level

  series:
    - {name: gilt10y_level, source: INTL_UK10Y, op: level, unit: "%", history: 13,
       description: "10-year UK gilt benchmark yield at the weekly Friday close."}
    - {name: slope_2s10s, sources: [INTL_UK10Y, INTL_UK2Y], op: spread, unit: "pp", history: 13,
       description: "10-year gilt yield minus 2-year gilt yield, in percentage points."}
    - {name: gilt_ust_spread, sources: [INTL_UK10Y, INTL_US10Y], op: spread, unit: "pp", history: 13,
       description: "10-year gilt yield minus 10-year US Treasury yield, in percentage points."}

  scalars:
    - {name: gilt2y_level, source: INTL_UK2Y, op: level, unit: "%",
       description: "2-year UK gilt yield at the weekly Friday close."}
    - {name: gilt2y_change_4w, source: INTL_UK2Y, op: diff, window: 4, unit: "pp",
       description: "2-year gilt yield minus its value 4 weeks earlier."}
    - {name: gilt10y_change_4w, source: "@gilt10y_level", op: diff, window: 4, unit: "pp",
       description: "10-year gilt yield minus its value 4 weeks earlier."}
    - {name: gbpusd_change_4w, source: INTL_GBPUSD, op: pct_change, window: 4, unit: "%",
       description: "Percent change of GBPUSD spot versus its value 4 weeks earlier."}

text_corpus: data/boe/documents.jsonl

# BoE policy vocabulary; uk_equity takes the activity vocabulary.
text_cues:
  - "Bank Rate"
  - "interest rate"
  - "CPI inflation"
  - "inflation target"
  - "inflation"
  - "gilt"
  - "quantitative easing"
  - "asset purchase"
