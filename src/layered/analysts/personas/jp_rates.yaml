# Analyst spec — Japan rates (JGB curve).
#
# Features are vendored INTL_* weekly Bloomberg Friday closes (data/intl/,
# already point-in-time — see that directory's README). Text channel: Bank of
# Japan Statements on Monetary Policy (data/boj/documents.jsonl).
# Era caveat: under yield-curve control (2016-2024) the 10y JGB was pinned in a
# narrow band, so weekly up/down variation is small for long stretches — a
# grading fact, acceptable for the narrative deliverable.
# A LIVE run of this persona is a NEW experiment (prereg + cost approval).

display_name: "Japan rates (JGB yields, the Japanese benchmark curve)"

horizon:
  # Weekly-native series: one Friday to the next is already non-overlapping.
  kind: fixed
  clock: INTL_JP10Y
  clock_freq: null
  label: "one week ahead (the next weekly close)"
  approx_days: 7

mandate:
  - "Judge whether Japanese long-term yields are rising or falling over the coming week, and how strongly."
  - "The graded measurement is jgb10y_level: 'up' means the 10-year JGB yield RISES."
  - "Weigh the level of the 10-year yield, the 2s10s slope, the spread to US Treasuries, and the recent direction of short rates (the policy-expectations proxy) and the yen. Levels may be near zero or pinned for long stretches; judge direction within that regime."
  - "All yields are percent in local (yen) terms; jpyusd features quote US dollars per yen."
  - "Do not reason about other drivers or any trade — only Japanese rates."

features:
  level_feature: jgb10y_level

  series:
    - {name: jgb10y_level, source: INTL_JP10Y, op: level, unit: "%", history: 13,
       description: "10-year Japanese government bond benchmark yield at the weekly Friday close."}
    - {name: slope_2s10s, sources: [INTL_JP10Y, INTL_JP2Y], op: spread, unit: "pp", history: 13,
       description: "10-year JGB yield minus 2-year JGB yield, in percentage points."}
    - {name: jgb_ust_spread, sources: [INTL_JP10Y, INTL_US10Y], op: spread, unit: "pp", history: 13,
       description: "10-year JGB yield minus 10-year US Treasury yield, in percentage points."}

  scalars:
    - {name: jgb2y_level, source: INTL_JP2Y, op: level, unit: "%",
       description: "2-year JGB yield at the weekly Friday close."}
    - {name: jgb2y_change_4w, source: INTL_JP2Y, op: diff, window: 4, unit: "pp",
       description: "2-year JGB yield minus its value 4 weeks earlier."}
    - {name: jgb10y_change_4w, source: "@jgb10y_level", op: diff, window: 4, unit: "pp",
       description: "10-year JGB yield minus its value 4 weeks earlier."}
    - {name: jpyusd_change_4w, source: INTL_JPYUSD, op: pct_change, window: 4, unit: "%",
       description: "Percent change of JPYUSD spot versus its value 4 weeks earlier."}

text_corpus: data/boj/documents.jsonl

# BoJ policy vocabulary; jp_equity takes the activity vocabulary.
text_cues:
  - "yield curve control"
  - "JGB"
  - "price stability target"
  - "uncollateralized overnight call rate"
  - "quantitative and qualitative monetary easing"
  - "policy interest rate"
  - "interest rate"
  - "inflation"
